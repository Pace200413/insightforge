services:
  postgres:
    image: postgres:16-alpine
    container_name: insightforge-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insightforge}
      POSTGRES_USER: ${POSTGRES_USER:-insightforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insightforge_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insightforge} -d ${POSTGRES_DB:-insightforge}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
