<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InsightForge — AI Data Analyst</title>
<style>
  /* ---------------------------------------------------------------------
     Design tokens
     Subject: forensic business-intelligence. The vibe is an analyst's
     workbench / lab notebook, not a SaaS dashboard. Ink on paper-white,
     with a single signal color (electric indigo) reserved for the AI's
     own actions, and amber for warnings/repairs — like margin notes.
  --------------------------------------------------------------------- */
  :root {
    --paper:     #FBFAF7;
    --ink:       #1A1917;
    --ink-soft:  #55524C;
    --ink-faint: #8B877E;
    --rule:      #E3DFD6;
    --rule-soft: #EEEBE3;
    --signal:    #3A34D2;   /* AI actions */
    --signal-bg: #EEEDFB;
    --amber:     #B26B00;   /* repairs / warnings */
    --amber-bg:  #FBF2E0;
    --green:     #206A42;   /* success */
    --green-bg:  #E6F1EA;
    --red:       #B3261E;   /* failure */
    --red-bg:    #FBEAE8;
    --mono: "SFMono-Regular", ui-monospace, "JetBrains Mono", Menlo, monospace;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 28px; }

  /* ---- Masthead ---- */
  header.masthead {
    border-bottom: 2px solid var(--ink);
    padding: 30px 0 20px;
    margin-bottom: 34px;
  }
  .masthead-inner { display: flex; align-items: baseline; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  .brand {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand .fire { color: var(--signal); }
  .tagline {
    font-family: var(--mono);
    font-size: 11.5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .status-dot {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: var(--mono); font-size: 11.5px; color: var(--ink-soft);
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-faint); }
  .dot.live { background: var(--green); box-shadow: 0 0 0 3px var(--green-bg); }
  .dot.down { background: var(--red); box-shadow: 0 0 0 3px var(--red-bg); }

  /* ---- Ask bar ---- */
  .ask {
    display: flex; gap: 10px; margin-bottom: 14px;
  }
  .ask input {
    flex: 1;
    font-family: var(--serif);
    font-size: 19px;
    padding: 15px 18px;
    border: 1.5px solid var(--rule);
    border-radius: 3px;
    background: #fff;
    color: var(--ink);
  }
  .ask input:focus { outline: none; border-color: var(--signal); }
  .ask button {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 0 26px;
    border: none;
    border-radius: 3px;
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
    transition: background 0.15s;
  }
  .ask button:hover:not(:disabled) { background: var(--signal); }
  .ask button:disabled { opacity: 0.4; cursor: not-allowed; }

  .examples { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 40px; }
  .chip {
    font-size: 12.5px; color: var(--ink-soft);
    padding: 5px 12px; border: 1px solid var(--rule);
    border-radius: 20px; background: #fff; cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--signal); color: var(--signal); }

  /* ---- Layout: timeline + main ---- */
  .grid { display: grid; grid-template-columns: 260px 1fr; gap: 40px; align-items: start; }
  @media (max-width: 880px) { .grid { grid-template-columns: 1fr; } }

  /* ---- Timeline (signature element) ---- */
  .timeline-title, .section-title {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--ink-faint);
    margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--rule);
  }
  .timeline { position: sticky; top: 24px; }
  .tl-step {
    position: relative; padding: 0 0 4px 26px; margin-bottom: 4px;
    min-height: 34px;
  }
  .tl-step::before {  /* the rail */
    content: ""; position: absolute; left: 6px; top: 20px; bottom: -4px;
    width: 1.5px; background: var(--rule);
  }
  .tl-step:last-child::before { display: none; }
  .tl-node {
    position: absolute; left: 0; top: 4px;
    width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid var(--rule); background: var(--paper); z-index: 1;
  }
  .tl-step.done .tl-node   { border-color: var(--green); background: var(--green); }
  .tl-step.active .tl-node { border-color: var(--signal); background: var(--signal);
                             animation: pulse 1.1s infinite; }
  .tl-step.failed .tl-node { border-color: var(--red); background: var(--red); }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 var(--signal-bg);} 50%{ box-shadow:0 0 0 5px var(--signal-bg);} }
  .tl-label { font-size: 13px; color: var(--ink-soft); padding-top: 2px; }
  .tl-step.active .tl-label { color: var(--signal); font-weight: 600; }
  .tl-step.done .tl-label   { color: var(--ink); }
  .tl-meta { font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); margin-top: 1px; }

  /* ---- Main column ---- */
  .placeholder {
    border: 1.5px dashed var(--rule); border-radius: 4px;
    padding: 60px 30px; text-align: center; color: var(--ink-faint);
    font-family: var(--serif); font-size: 17px; font-style: italic;
  }

  /* ---- Verdict card ---- */
  .verdict {
    border: 1.5px solid var(--ink); border-radius: 4px;
    padding: 26px 28px; margin-bottom: 28px; background: #fff;
    position: relative;
  }
  .verdict .eyebrow {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--signal); margin-bottom: 10px;
  }
  .verdict h2 {
    font-family: var(--serif); font-size: 25px; font-weight: 600;
    line-height: 1.28; margin-bottom: 14px; letter-spacing: -0.01em;
  }
  .verdict .conclusion { color: var(--ink-soft); font-size: 15px; }
  .confidence {
    display: inline-flex; align-items: center; gap: 8px; margin-top: 18px;
    font-family: var(--mono); font-size: 11.5px; color: var(--ink-soft);
  }
  .conf-bar { width: 90px; height: 6px; background: var(--rule); border-radius: 3px; overflow: hidden; }
  .conf-fill { height: 100%; background: var(--signal); }

  /* ---- Findings ---- */
  .finding {
    border: 1px solid var(--rule); border-left: 3px solid var(--ink-faint);
    border-radius: 3px; margin-bottom: 12px; background: #fff; overflow: hidden;
  }
  .finding.fact        { border-left-color: var(--green); }
  .finding.hypothesis  { border-left-color: var(--signal); }
  .finding.data_quality{ border-left-color: var(--amber); }
  .finding.warning     { border-left-color: var(--red); }
  .f-head {
    display: flex; align-items: center; gap: 12px; padding: 14px 18px;
    cursor: pointer; user-select: none;
  }
  .f-type {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em;
    text-transform: uppercase; padding: 3px 8px; border-radius: 3px; white-space: nowrap;
  }
  .fact .f-type        { background: var(--green-bg); color: var(--green); }
  .hypothesis .f-type  { background: var(--signal-bg); color: var(--signal); }
  .data_quality .f-type{ background: var(--amber-bg); color: var(--amber); }
  .warning .f-type     { background: var(--red-bg); color: var(--red); }
  .f-title { font-weight: 600; font-size: 14.5px; flex: 1; }
  .f-mag { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); }
  .f-toggle { color: var(--ink-faint); font-size: 12px; transition: transform 0.2s; }
  .finding.open .f-toggle { transform: rotate(90deg); }
  .f-body {
    display: none; padding: 0 18px 16px; font-size: 14px; color: var(--ink-soft);
    border-top: 1px solid var(--rule-soft);
  }
  .finding.open .f-body { display: block; padding-top: 14px; }
  .f-evidence {
    margin-top: 14px; font-family: var(--mono); font-size: 11px;
    color: var(--ink-faint);
  }
  .f-evidence .lbl { text-transform: uppercase; letter-spacing: 0.05em; }
  pre.sql {
    background: #F4F2EC; border: 1px solid var(--rule); border-radius: 3px;
    padding: 12px 14px; margin-top: 8px; overflow-x: auto;
    font-family: var(--mono); font-size: 11.5px; line-height: 1.55; color: var(--ink);
    white-space: pre-wrap; word-break: break-word;
  }

  /* ---- Evidence steps ---- */
  .step {
    border: 1px solid var(--rule); border-radius: 3px; margin-bottom: 10px;
    background: #fff; overflow: hidden;
  }
  .s-head { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; }
  .s-badge {
    font-family: var(--mono); font-size: 10px; text-transform: uppercase;
    padding: 3px 8px; border-radius: 3px; white-space: nowrap;
  }
  .s-badge.succeeded { background: var(--green-bg); color: var(--green); }
  .s-badge.repaired  { background: var(--amber-bg); color: var(--amber); }
  .s-badge.failed    { background: var(--red-bg); color: var(--red); }
  .s-id { font-family: var(--mono); font-size: 13px; font-weight: 600; flex: 1; }
  .s-meta { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); }
  .s-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--rule-soft); }
  .step.open .s-body { display: block; padding-top: 12px; }
  .s-desc { font-size: 13px; color: var(--ink-soft); margin-bottom: 6px; }
  .warn-line {
    font-family: var(--mono); font-size: 11px; color: var(--amber);
    background: var(--amber-bg); padding: 6px 10px; border-radius: 3px; margin-top: 8px;
  }
  table.rows { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
  table.rows th, table.rows td {
    text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--rule-soft);
    font-family: var(--mono); font-size: 11.5px;
  }
  table.rows th { color: var(--ink-faint); text-transform: uppercase; font-size: 10px; letter-spacing: 0.04em; }

  /* ---- Metrics strip ---- */
  .metrics { display: flex; gap: 0; border: 1px solid var(--rule); border-radius: 4px; margin-bottom: 28px; background: #fff; overflow: hidden; }
  .metric { flex: 1; padding: 16px 18px; border-right: 1px solid var(--rule); }
  .metric:last-child { border-right: none; }
  .m-val { font-family: var(--serif); font-size: 24px; font-weight: 600; }
  .m-val .unit { font-size: 13px; color: var(--ink-faint); font-family: var(--mono); }
  .m-lbl { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-faint); margin-top: 3px; }

  .err-box {
    border: 1.5px solid var(--red); background: var(--red-bg); border-radius: 4px;
    padding: 18px 20px; color: var(--red); font-size: 14px;
  }
  .err-box code { font-family: var(--mono); font-size: 12px; }

  .spin { display: inline-block; width: 13px; height: 13px; border: 2px solid var(--signal-bg);
          border-top-color: var(--signal); border-radius: 50%; animation: rot 0.7s linear infinite; }
  @keyframes rot { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <header class="masthead">
    <div class="wrap masthead-inner">
      <div>
        <div class="brand">Insight<span class="fire">Forge</span></div>
        <div class="tagline">Autonomous business-intelligence analyst</div>
      </div>
      <div class="status-dot"><span class="dot" id="statusDot"></span><span id="statusText">checking backend…</span></div>
    </div>
  </header>

  <main class="wrap">
    <div class="ask">
      <input id="q" type="text" placeholder="Ask a question about the business…"
             value="Why did revenue drop last month?">
      <button id="runBtn" onclick="run()">Investigate</button>
    </div>
    <div class="examples" id="examples"></div>

    <div class="grid">
      <aside>
        <div class="timeline-title">Investigation</div>
        <div class="timeline" id="timeline">
          <div class="tl-step"><span class="tl-node"></span><div class="tl-label">Waiting for a question</div></div>
        </div>
      </aside>

      <section id="main">
        <div class="placeholder">Ask a question to begin an investigation.<br>
          The analyst will plan its steps, write SQL, check every query for safety,
          repair failures, and explain what it found — with the evidence attached.</div>
      </section>
    </div>
  </main>

<script>
const API = "http://localhost:8000";
const EXAMPLES = [
  "Why did revenue drop last month?",
  "Why did refunds increase last month?",
  "Which marketing campaign performed worst last month?",
  "What was our net revenue in May 2026?",
];
const REF_DATE = "2026-07-01";

// The pipeline stages we animate while waiting for the (single) API response.
const STAGES = [
  ["interpret", "Understanding the question"],
  ["schema",    "Discovering relevant tables"],
  ["plan",      "Planning investigation steps"],
  ["sql",       "Generating & running SQL"],
  ["validate",  "Validating results"],
  ["insight",   "Writing the conclusion"],
];

const el = (id) => document.getElementById(id);

// ---- examples ----
el("examples").innerHTML = EXAMPLES.map(e =>
  `<span class="chip" onclick="setQ(this)">${e}</span>`).join("");
function setQ(node){ el("q").value = node.textContent; }

// ---- backend status ----
async function checkStatus(){
  try {
    const r = await fetch(API + "/health/db");
    const j = await r.json();
    if (j.connected){ el("statusDot").className = "dot live"; el("statusText").textContent = "backend live · db connected"; }
    else { el("statusDot").className = "dot down"; el("statusText").textContent = "db unavailable"; }
  } catch {
    el("statusDot").className = "dot down";
    el("statusText").textContent = "backend offline — start with: make run";
  }
}
checkStatus();

// ---- timeline animation ----
let stageTimer = null;
function animateTimeline(){
  let i = 0;
  const render = () => {
    el("timeline").innerHTML = STAGES.map((s, idx) => {
      const cls = idx < i ? "done" : idx === i ? "active" : "";
      const meta = idx === i ? '<div class="tl-meta">working…</div>' : "";
      return `<div class="tl-step ${cls}"><span class="tl-node"></span>
                <div class="tl-label">${s[1]}</div>${meta}</div>`;
    }).join("");
  };
  render();
  stageTimer = setInterval(() => {
    i = Math.min(i + 1, STAGES.length - 1);
    render();
  }, 2600);
}
function finishTimeline(steps){
  clearInterval(stageTimer);
  el("timeline").innerHTML = STAGES.map(s =>
    `<div class="tl-step done"><span class="tl-node"></span><div class="tl-label">${s[1]}</div></div>`
  ).join("") + `<div class="tl-step done"><span class="tl-node"></span>
      <div class="tl-label">Done</div>
      <div class="tl-meta">${steps} steps executed</div></div>`;
}
function failTimeline(){
  clearInterval(stageTimer);
  const cur = el("timeline").querySelector(".tl-step.active");
  if (cur){ cur.className = "tl-step failed"; }
}

// ---- run investigation ----
async function run(){
  const question = el("q").value.trim();
  if (!question) return;
  el("runBtn").disabled = true;
  el("runBtn").innerHTML = '<span class="spin"></span>';
  el("main").innerHTML = `<div class="placeholder"><span class="spin"></span>&nbsp;
      Investigating — this runs several real SQL queries and can take 30–60s.</div>`;
  animateTimeline();

  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 300000);  // 90s hard cap
    const r = await fetch(API + "/investigate/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, reference_date: REF_DATE }),
      signal: ctrl.signal,
    });
    clearTimeout(timeout);
    if (!r.ok){
      const t = await r.text();
      throw new Error("HTTP " + r.status + " — " + t.slice(0, 200));
    }
    const data = await r.json();
    finishTimeline(data.step_results.length);
    render(data);
  } catch (e){
    failTimeline();
    el("main").innerHTML = `<div class="err-box"><strong>Investigation failed.</strong><br>
      <code>${e.message}</code><br><br>
      If this is a rate-limit or credit error, it's the LLM provider, not the pipeline.</div>`;
  } finally {
    el("runBtn").disabled = false;
    el("runBtn").textContent = "Investigate";
  }
}

// ---- render results ----
function render(data){
  const ins = data.insight;
  const audit = data.audit_summary || {};
  let html = "";

  // Verdict
  if (ins && ins.overall_confidence > 0){
    html += `<div class="verdict">
      <div class="eyebrow">Primary finding</div>
      <h2>${escapeHtml(ins.summary)}</h2>
      <div class="conclusion">${escapeHtml(ins.primary_cause)}</div>
      <div class="confidence">CONFIDENCE
        <span class="conf-bar"><span class="conf-fill" style="width:${Math.round(ins.overall_confidence*100)}%"></span></span>
        ${Math.round(ins.overall_confidence*100)}%
      </div>
    </div>`;
  }

  // Metrics strip
  html += `<div class="metrics">
    <div class="metric"><div class="m-val">${data.steps_succeeded}<span class="unit">/${data.step_results.length}</span></div><div class="m-lbl">Queries succeeded</div></div>
    <div class="metric"><div class="m-val">${audit.repaired||0}</div><div class="m-lbl">Auto-repaired</div></div>
    <div class="metric"><div class="m-val">${audit.blocked||0}</div><div class="m-lbl">Blocked by firewall</div></div>
    <div class="metric"><div class="m-val">${(data.total_ms/1000).toFixed(1)}<span class="unit">s</span></div><div class="m-lbl">Total time</div></div>
  </div>`;

  // Findings
  if (ins && ins.findings && ins.findings.length){
    html += `<div class="section-title">Findings</div>`;
    ins.findings.forEach((f, i) => {
      const stepChips = (f.supporting_step_ids||[]).join(", ") || "—";
      html += `<div class="finding ${f.finding_type}" onclick="toggle(this)">
        <div class="f-head">
          <span class="f-type">${f.finding_type.replace("_"," ")}</span>
          <span class="f-title">${escapeHtml(f.title)}</span>
          ${f.magnitude ? `<span class="f-mag">${escapeHtml(f.magnitude)}</span>` : ""}
          <span class="f-toggle">▶</span>
        </div>
        <div class="f-body">
          ${escapeHtml(f.description)}
          <div class="f-evidence"><span class="lbl">Evidence:</span> steps ${stepChips}
            &nbsp;·&nbsp; <span class="lbl">Confidence:</span> ${Math.round(f.confidence*100)}%</div>
        </div>
      </div>`;
    });
  }

  // Conclusion + caveats
  if (ins && ins.conclusion){
    html += `<div class="section-title" style="margin-top:28px">Conclusion</div>
      <div style="font-size:15px; color:var(--ink-soft); line-height:1.6">${escapeHtml(ins.conclusion)}</div>`;
  }
  if (ins && ins.unanswered_questions && ins.unanswered_questions.length){
    html += `<div class="section-title" style="margin-top:24px">What the data can't tell us</div>
      <ul style="padding-left:20px; color:var(--ink-soft); font-size:14px">
      ${ins.unanswered_questions.map(u=>`<li style="margin-bottom:4px">${escapeHtml(u)}</li>`).join("")}</ul>`;
  }
  if (ins && ins.data_quality_warnings && ins.data_quality_warnings.length){
    html += `<div class="section-title" style="margin-top:24px">Data-quality notes</div>
      ${ins.data_quality_warnings.map(w=>`<div class="warn-line">${escapeHtml(w)}</div>`).join("")}`;
  }

  // Evidence panel (steps)
  html += `<div class="section-title" style="margin-top:32px">Evidence — every query the analyst ran</div>`;
  data.step_results.forEach(s => {
    const rowsTable = renderRows(s.rows);
    const warns = (s.validation_warnings||[]).map(w =>
      `<div class="warn-line">⚠ ${escapeHtml(w.message)}</div>`).join("");
    html += `<div class="step" onclick="toggle(this)">
      <div class="s-head">
        <span class="s-badge ${s.status}">${s.status}</span>
        <span class="s-id">${s.step_id}</span>
        <span class="s-meta">${s.row_count} rows${s.repair_attempts?` · ${s.repair_attempts} repair`+(s.repair_attempts>1?"s":""):""} · ${s.execution_ms}ms</span>
        <span class="f-toggle">▶</span>
      </div>
      <div class="s-body">
        <div class="s-desc">${escapeHtml(s.description)}</div>
        ${s.sql ? `<pre class="sql">${escapeHtml(s.sql)}</pre>` : ""}
        ${s.error ? `<div class="warn-line" style="color:var(--red);background:var(--red-bg)">${escapeHtml(s.error)}</div>` : ""}
        ${warns}
        ${rowsTable}
      </div>
    </div>`;
  });

  el("main").innerHTML = html;
}

function renderRows(rows){
  if (!rows || !rows.length) return "";
  const cols = Object.keys(rows[0]);
  const head = cols.map(c=>`<th>${escapeHtml(c)}</th>`).join("");
  const body = rows.slice(0,8).map(r =>
    `<tr>${cols.map(c=>`<td>${escapeHtml(String(r[c]))}</td>`).join("")}</tr>`).join("");
  const more = rows.length>8 ? `<tr><td colspan="${cols.length}" style="color:var(--ink-faint)">… ${rows.length-8} more rows</td></tr>` : "";
  return `<table class="rows"><thead><tr>${head}</tr></thead><tbody>${body}${more}</tbody></table>`;
}

function toggle(node){ node.classList.toggle("open"); event.stopPropagation(); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

el("q").addEventListener("keydown", e => { if (e.key === "Enter") run(); });
</script>
</body>
</html>
